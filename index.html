<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video</title>
    <style>
      :root {
        color-scheme: only light;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      video {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: #000;
      }

      video::-webkit-media-controls {
        display: none !important;
      }

      video::-webkit-media-controls-enclosure {
        display: none !important;
      }

      #countdown {
        position: fixed;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font: 700 1rem/1.2 "Segoe UI", Tahoma, sans-serif;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        padding: 0.45rem 0.85rem;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <video
      id="video"
      playsinline
      preload="auto"
      controlslist="nodownload nofullscreen noplaybackrate noremoteplayback"
      disablepictureinpicture
      disableremoteplayback
    >
      <source src="rick-roll.mp4" type="video/mp4" />
      Your browser does not support HTML5 video.
    </video>

    <div id="countdown" aria-hidden="true">Time remaining 00:00</div>

    <script>
      const video = document.getElementById("video");
      const countdown = document.getElementById("countdown");
      let lockInput = false;
      let countdownInterval;
      let playbackRequiresGesture = false;
      let isStartingFromGesture = false;
      let braveMobileCheck;

      // Keep controls disabled even if a browser extension or script toggles them.
      video.controls = false;
      video.removeAttribute("controls");

      function isFullscreenActive() {
        return Boolean(
          document.fullscreenElement ||
            document.webkitFullscreenElement ||
            document.msFullscreenElement
        );
      }

      function tryFullscreen() {
        if (isFullscreenActive()) {
          return Promise.resolve();
        }

        if (video.requestFullscreen) {
          return video.requestFullscreen().catch(() => {});
        }

        if (video.webkitRequestFullscreen) {
          try {
            video.webkitRequestFullscreen();
          } catch {
            // Ignore browser refusal.
          }
          return Promise.resolve();
        }

        if (video.msRequestFullscreen) {
          try {
            video.msRequestFullscreen();
          } catch {
            // Ignore browser refusal.
          }
          return Promise.resolve();
        }

        if (video.webkitEnterFullscreen) {
          try {
            video.webkitEnterFullscreen();
          } catch {
            // Ignore browser refusal.
          }
        }

        return Promise.resolve();
      }

      function updateInputLock() {
        lockInput = isFullscreenActive();
      }

      function blockWhenLocked(event) {
        if (!lockInput) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();
      }

      function formatClock(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      function updateCountdown() {
        if (!Number.isFinite(video.duration) || video.duration <= 0) {
          countdown.textContent = "Time remaining --:--";
          return;
        }

        const remaining = Math.max(0, Math.ceil(video.duration - video.currentTime));
        countdown.textContent = `Time remaining ${formatClock(remaining)}`;
      }

      function startCountdown() {
        clearInterval(countdownInterval);
        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 250);
      }

      async function isBraveMobileBrowser() {
        if (typeof braveMobileCheck === "boolean") {
          return braveMobileCheck;
        }

        const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "");
        if (!isMobile) {
          braveMobileCheck = false;
          return false;
        }

        if (!navigator.brave || typeof navigator.brave.isBrave !== "function") {
          braveMobileCheck = false;
          return false;
        }

        try {
          braveMobileCheck = await navigator.brave.isBrave();
        } catch {
          braveMobileCheck = false;
        }

        return braveMobileCheck;
      }

      async function attemptAutoplayWithSound() {
        try {
          video.defaultMuted = false;
          video.muted = false;
          video.volume = 1;
          await video.play();

          // Treat autoplay as successful only if media is actively running unmuted.
          if (!video.paused && !video.ended && !video.muted && video.volume > 0) {
            // Brave mobile can report unmuted playback while audio output is still blocked.
            if (await isBraveMobileBrowser()) {
              throw new Error("Brave mobile requires a user gesture for sound");
            }

            playbackRequiresGesture = false;
            return;
          }

          throw new Error("Autoplay started without sound");
        } catch {
          // If autoplay with sound is blocked, stop and wait for user gesture.
          playbackRequiresGesture = true;
          video.pause();
          video.currentTime = 0;
        }
      }

      async function startPlaybackFromGesture() {
        if (isStartingFromGesture) {
          return;
        }

        isStartingFromGesture = true;
        video.muted = false;
        video.volume = 1;

        try {
          await video.play();
          playbackRequiresGesture = false;
        } catch {
          playbackRequiresGesture = true;
          return;
        } finally {
          isStartingFromGesture = false;
        }

        await tryFullscreen();
      }

      function handleFullscreenGesture() {
        if (!playbackRequiresGesture && !video.paused && !video.ended) {
          void tryFullscreen();
          return;
        }

        void startPlaybackFromGesture();
      }

      document.addEventListener("click", handleFullscreenGesture);
      document.addEventListener("touchstart", handleFullscreenGesture, { passive: true });
      video.addEventListener("play", startCountdown);
      video.addEventListener("timeupdate", updateCountdown);
      video.addEventListener("loadedmetadata", updateCountdown);
      document.addEventListener("fullscreenchange", updateInputLock);
      document.addEventListener("webkitfullscreenchange", updateInputLock);
      [
        "click",
        "dblclick",
        "mousedown",
        "mouseup",
        "pointerdown",
        "pointerup",
        "touchstart",
        "touchend",
        "keydown",
        "keyup",
        "wheel",
        "contextmenu"
      ].forEach((eventName) => {
        document.addEventListener(eventName, blockWhenLocked, {
          capture: true,
          passive: false
        });
      });

      video.addEventListener("ended", async () => {
        clearInterval(countdownInterval);
        countdown.textContent = "Time remaining 00:00";

        if (document.fullscreenElement && document.exitFullscreen) {
          try {
            await document.exitFullscreen();
          } catch {
            // Ignore if browser blocks fullscreen exit.
          }
        }

        if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
          try {
            document.webkitExitFullscreen();
          } catch {
            // Ignore browser refusal.
          }
        }

        updateInputLock();
      });

      attemptAutoplayWithSound();
    </script>
  </body>
</html>
