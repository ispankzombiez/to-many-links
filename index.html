<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video</title>
    <style>
      :root {
        color-scheme: only light;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      video {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: #000;
      }

      video::-webkit-media-controls {
        display: none !important;
      }

      video::-webkit-media-controls-enclosure {
        display: none !important;
      }

      #fallback {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font: 700 1.1rem/1.35 "Segoe UI", Tahoma, sans-serif;
        text-align: center;
        padding: 1.25rem;
        cursor: pointer;
        user-select: none;
      }

      #fallback.show {
        display: grid;
      }

      #countdown {
        position: fixed;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font: 700 1rem/1.2 "Segoe UI", Tahoma, sans-serif;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        padding: 0.45rem 0.85rem;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <video
      id="video"
      autoplay
      playsinline
      preload="auto"
      controls="false"
      controlslist="nodownload nofullscreen noplaybackrate noremoteplayback"
      disablepictureinpicture
      disableremoteplayback
    >
      <source src="rick-roll.mp4" type="video/mp4" />
      Your browser does not support HTML5 video.
    </video>

    <div id="fallback" aria-hidden="true">Tap or click anywhere for fullscreen + sound</div>
    <div id="countdown" aria-hidden="true">Time remaining 00:00</div>

    <script>
      const video = document.getElementById("video");
      const fallback = document.getElementById("fallback");
      const countdown = document.getElementById("countdown");
      let lockInput = false;
      let countdownInterval;

      // Keep controls disabled even if a browser extension or script toggles them.
      video.controls = false;
      video.removeAttribute("controls");

      function isFullscreenActive() {
        return Boolean(
          document.fullscreenElement ||
            document.webkitFullscreenElement ||
            document.msFullscreenElement
        );
      }

      function tryFullscreen() {
        if (isFullscreenActive()) {
          return Promise.resolve();
        }

        if (video.requestFullscreen) {
          return video.requestFullscreen().catch(() => {});
        }

        if (video.webkitRequestFullscreen) {
          try {
            video.webkitRequestFullscreen();
          } catch {
            // Ignore browser refusal.
          }
          return Promise.resolve();
        }

        if (video.msRequestFullscreen) {
          try {
            video.msRequestFullscreen();
          } catch {
            // Ignore browser refusal.
          }
          return Promise.resolve();
        }

        if (video.webkitEnterFullscreen) {
          try {
            video.webkitEnterFullscreen();
          } catch {
            // Ignore browser refusal.
          }
        }

        return Promise.resolve();
      }

      function hideFallback() {
        fallback.classList.remove("show");
      }

      function updateInputLock() {
        lockInput = isFullscreenActive();
      }

      function blockWhenLocked(event) {
        if (!lockInput) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();
      }

      function formatClock(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      function updateCountdown() {
        if (!Number.isFinite(video.duration) || video.duration <= 0) {
          countdown.textContent = "Time remaining --:--";
          return;
        }

        const remaining = Math.max(0, Math.ceil(video.duration - video.currentTime));
        countdown.textContent = `Time remaining ${formatClock(remaining)}`;
      }

      function startCountdown() {
        clearInterval(countdownInterval);
        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 250);
      }

      async function restoreSound() {
        try {
          video.muted = false;
          video.volume = 1;
          if (video.paused) {
            await video.play();
          }
        } catch {
          // Ignore if browser still rejects sound playback.
        }
      }

      async function startPlayback() {
        try {
          video.muted = false;
          video.volume = 1;

          try {
            await video.play();
          } catch {
            // Most browsers block autoplay with sound; retry muted so playback still starts.
            video.muted = true;
            await video.play();
          }

          hideFallback();
          await tryFullscreen();
        } catch {
          fallback.classList.add("show");
        }
      }

      fallback.addEventListener("click", startPlayback);
      fallback.addEventListener("touchstart", startPlayback, { passive: true });
      document.addEventListener("click", () => {
        restoreSound();
        tryFullscreen();
      });
      document.addEventListener(
        "touchstart",
        () => {
          restoreSound();
          tryFullscreen();
        },
        { passive: true }
      );
      video.addEventListener("play", tryFullscreen);
      video.addEventListener("play", startCountdown);
      video.addEventListener("timeupdate", updateCountdown);
      video.addEventListener("loadedmetadata", updateCountdown);
      document.addEventListener("fullscreenchange", updateInputLock);
      document.addEventListener("webkitfullscreenchange", updateInputLock);
      [
        "click",
        "dblclick",
        "mousedown",
        "mouseup",
        "pointerdown",
        "pointerup",
        "touchstart",
        "touchend",
        "keydown",
        "keyup",
        "wheel",
        "contextmenu"
      ].forEach((eventName) => {
        document.addEventListener(eventName, blockWhenLocked, {
          capture: true,
          passive: false
        });
      });

      video.addEventListener("ended", async () => {
        clearInterval(countdownInterval);
        countdown.textContent = "Time remaining 00:00";

        if (document.fullscreenElement && document.exitFullscreen) {
          try {
            await document.exitFullscreen();
          } catch {
            // Ignore if browser blocks fullscreen exit.
          }
        }

        if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
          try {
            document.webkitExitFullscreen();
          } catch {
            // Ignore browser refusal.
          }
        }

        updateInputLock();
      });

      startPlayback();
    </script>
  </body>
</html>
