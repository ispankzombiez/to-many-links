<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video</title>
    <style>
      :root {
        color-scheme: only light;
        --flower-green: #38d66b;
        --flower-green-dark: #23b756;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      #stage {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: grid;
        place-items: center;
        background: #000;
        overflow: hidden;
      }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        gap: 1.4rem;
        padding: 2rem;
        background: radial-gradient(circle at 50% 12%, #1f3328 0%, #08110c 45%, #000 100%);
        text-align: center;
      }

      #splashTitle {
        margin: 0;
        color: #ecffee;
        font: 900 clamp(2rem, 9vw, 4rem) / 1.05 "Segoe UI", Tahoma, sans-serif;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      #startButton {
        border: 0;
        border-radius: 999px;
        padding: 1rem 2.4rem;
        min-width: min(90vw, 340px);
        color: #021107;
        background: linear-gradient(180deg, #57ef8a 0%, var(--flower-green) 65%, var(--flower-green-dark) 100%);
        box-shadow: 0 8px 24px rgba(54, 211, 106, 0.38);
        font: 900 clamp(1.4rem, 4.5vw, 2rem) / 1 "Segoe UI", Tahoma, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
      }

      #startButton:active {
        transform: translateY(1px);
      }

      #startHint {
        margin: 0;
        color: rgba(230, 255, 240, 0.92);
        font: 600 0.98rem/1.35 "Segoe UI", Tahoma, sans-serif;
      }

      #madeWithGithub {
        position: fixed;
        left: 50%;
        bottom: 1rem;
        z-index: 25;
        transform: translateX(-50%);
        color: rgba(233, 255, 241, 0.86);
        font: 600 0.86rem/1 "Segoe UI", Tahoma, sans-serif;
        text-decoration: none;
        letter-spacing: 0.03em;
        padding: 0.45rem 0.65rem;
        border-radius: 999px;
        border: 1px solid rgba(122, 219, 151, 0.3);
        background: rgba(0, 0, 0, 0.26);
      }

      #madeWithGithub:hover,
      #madeWithGithub:focus-visible {
        color: #f3fff6;
        border-color: rgba(122, 219, 151, 0.55);
        background: rgba(0, 0, 0, 0.42);
        outline: none;
      }

      body.started #splash {
        display: none;
      }

      body.started #madeWithGithub {
        display: none;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }

      video::-webkit-media-controls {
        display: none !important;
      }

      video::-webkit-media-controls-enclosure {
        display: none !important;
      }

      #countdown {
        position: absolute;
        bottom: 1rem;
        left: 50%;
        z-index: 30;
        transform: translateX(-50%);
        color: #fff;
        font: 700 1rem/1.2 "Segoe UI", Tahoma, sans-serif;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        padding: 0.45rem 0.85rem;
        pointer-events: none;
        user-select: none;
      }

      #countdown[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <section id="splash" aria-label="Start screen">
      <h1 id="splashTitle">$FLOWER Generator</h1>
      <button id="startButton" type="button">Start</button>
      <p id="startHint">Press Start To Begin Harvester</p>
    </section>

    <a
      id="madeWithGithub"
      href="https://github.com/ispankzombiez/FLOWER-Generator"
      target="_blank"
      rel="noopener noreferrer"
    >
      Made with GitHub
    </a>

    <div id="stage" aria-label="Playback stage">
      <video
        id="video"
        playsinline
        preload="auto"
        controlslist="nodownload nofullscreen noplaybackrate noremoteplayback"
        disablepictureinpicture
        disableremoteplayback
      >
        <!-- tutorial updating -->
        <source src="tutorial.mp4" type="video/mp4" />
        Your browser does not support HTML5 video.
      </video>
      <!-- tutorial updating -->

      <div id="countdown" hidden aria-hidden="true">until you can escape 00:00</div>
    </div>

    <script>
      const video = document.getElementById("video");
      const countdown = document.getElementById("countdown");
      const stage = document.getElementById("stage");
      const startButton = document.getElementById("startButton");
      let lockInput = false;
      let countdownInterval;
      let started = false;
      let startInProgress = false;

      // Keep controls disabled even if a browser extension or script toggles them.
      video.controls = false;
      video.removeAttribute("controls");
      video.muted = false;
      video.defaultMuted = false;
      video.volume = 1;

      function isFullscreenActive() {
        return Boolean(
          document.fullscreenElement ||
            document.webkitFullscreenElement ||
            document.msFullscreenElement
        );
      }

      function tryFullscreen() {
        if (isFullscreenActive()) {
          return Promise.resolve();
        }

        if (stage.requestFullscreen) {
          return stage.requestFullscreen().catch(() => {});
        }

        if (stage.webkitRequestFullscreen) {
          try {
            stage.webkitRequestFullscreen();
          } catch {
            // Ignore browser refusal.
          }
          return Promise.resolve();
        }

        if (stage.msRequestFullscreen) {
          try {
            stage.msRequestFullscreen();
          } catch {
            // Ignore browser refusal.
          }
          return Promise.resolve();
        }

        if (video.webkitEnterFullscreen) {
          try {
            video.webkitEnterFullscreen();
          } catch {
            // Ignore browser refusal.
          }
        }

        return Promise.resolve();
      }

      function updateInputLock() {
        lockInput = isFullscreenActive();
      }

      function isVideoFullscreen() {
        return Boolean(
          document.fullscreenElement === video ||
            document.webkitFullscreenElement === video ||
            document.msFullscreenElement === video ||
            video.webkitDisplayingFullscreen
        );
      }

      function blockWhenLocked(event) {
        if (!lockInput) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();
      }

      function formatClock(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      function updateCountdown() {
        if (!Number.isFinite(video.duration) || video.duration <= 0) {
          countdown.textContent = "--:-- until you can escape";
          return;
        }

        const remaining = Math.max(0, Math.ceil(video.duration - video.currentTime));
        countdown.textContent = `${formatClock(remaining)} until you can escape`;
      }

      function startCountdown() {
        countdown.hidden = false;
        countdown.setAttribute("aria-hidden", "false");
        clearInterval(countdownInterval);
        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 250);
      }

      async function startExperience() {
        if (startInProgress) {
          return;
        }

        startInProgress = true;
        video.muted = false;
        video.defaultMuted = false;
        video.volume = 1;

        try {
          const playPromise = video.play();
          const fullscreenPromise = tryFullscreen();

          await playPromise;
          await fullscreenPromise;

          started = true;
          document.body.classList.add("started");
          updateInputLock();

          if (isVideoFullscreen()) {
            startCountdown();
          }
        } finally {
          startInProgress = false;
        }
      }

      startButton.addEventListener("click", () => {
        void startExperience();
      });

      video.addEventListener("timeupdate", updateCountdown);
      video.addEventListener("loadedmetadata", updateCountdown);

      function handleFullscreenStateChange() {
        updateInputLock();

        if (!started) {
          countdown.hidden = true;
          countdown.setAttribute("aria-hidden", "true");
          return;
        }

        if (isFullscreenActive() && !video.paused && !video.ended) {
          startCountdown();
          return;
        }

        countdown.hidden = true;
        countdown.setAttribute("aria-hidden", "true");
      }

      document.addEventListener("fullscreenchange", handleFullscreenStateChange);
      document.addEventListener("webkitfullscreenchange", handleFullscreenStateChange);
      video.addEventListener("webkitbeginfullscreen", handleFullscreenStateChange);
      video.addEventListener("webkitendfullscreen", handleFullscreenStateChange);
      [
        "click",
        "dblclick",
        "mousedown",
        "mouseup",
        "pointerdown",
        "pointerup",
        "touchstart",
        "touchend",
        "keydown",
        "keyup",
        "wheel",
        "contextmenu"
      ].forEach((eventName) => {
        document.addEventListener(eventName, blockWhenLocked, {
          capture: true,
          passive: false
        });
      });

      video.addEventListener("ended", async () => {
        clearInterval(countdownInterval);
        countdown.textContent = "00:00 until you can escape";
        countdown.hidden = true;
        countdown.setAttribute("aria-hidden", "true");
        document.body.classList.remove("started");
        started = false;

        if (document.fullscreenElement && document.exitFullscreen) {
          try {
            await document.exitFullscreen();
          } catch {
            // Ignore if browser blocks fullscreen exit.
          }
        }

        if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
          try {
            document.webkitExitFullscreen();
          } catch {
            // Ignore browser refusal.
          }
        }

        updateInputLock();
      });
    </script>
  </body>
</html>
