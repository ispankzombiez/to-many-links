<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video</title>
    <style>
      :root {
        color-scheme: only light;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      video {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: #000;
      }

      #fallback {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font: 700 1.1rem/1.35 "Segoe UI", Tahoma, sans-serif;
        text-align: center;
        padding: 1.25rem;
        cursor: pointer;
        user-select: none;
      }

      #fallback.show {
        display: grid;
      }
    </style>
  </head>
  <body>
    <video id="video" autoplay playsinline preload="auto">
      <source src="rick-roll.mp4" type="video/mp4" />
      Your browser does not support HTML5 video.
    </video>

    <div id="fallback" aria-hidden="true">Tap or click anywhere to start video with sound</div>

    <script>
      const video = document.getElementById("video");
      const fallback = document.getElementById("fallback");

      function tryFullscreen() {
        if (!document.fullscreenElement && video.requestFullscreen) {
          return video.requestFullscreen().catch(() => {});
        }
        return Promise.resolve();
      }

      function hideFallback() {
        fallback.classList.remove("show");
      }

      async function startPlayback() {
        try {
          video.muted = false;
          video.volume = 1;

          await video.play();
          hideFallback();
          await tryFullscreen();
        } catch {
          fallback.classList.add("show");
        }
      }

      fallback.addEventListener("click", startPlayback);
      fallback.addEventListener("touchstart", startPlayback, { passive: true });

      video.addEventListener("ended", async () => {
        if (document.fullscreenElement && document.exitFullscreen) {
          try {
            await document.exitFullscreen();
          } catch {
            // Ignore if browser blocks fullscreen exit.
          }
        }
      });

      startPlayback();
    </script>
  </body>
</html>
