<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video</title>
    <style>
      :root {
        color-scheme: only light;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      video {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: #000;
      }

      #fallback {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font: 700 1.1rem/1.35 "Segoe UI", Tahoma, sans-serif;
        text-align: center;
        padding: 1.25rem;
        cursor: pointer;
        user-select: none;
      }

      #fallback.show {
        display: grid;
      }
    </style>
  </head>
  <body>
    <video id="video" autoplay playsinline preload="auto">
      <source src="rick-roll.mp4" type="video/mp4" />
      Your browser does not support HTML5 video.
    </video>

    <div id="fallback" aria-hidden="true">Tap or click anywhere for fullscreen + sound</div>

    <script>
      const video = document.getElementById("video");
      const fallback = document.getElementById("fallback");
      let lockInput = false;

      function isFullscreenActive() {
        return Boolean(
          document.fullscreenElement ||
            document.webkitFullscreenElement ||
            document.msFullscreenElement
        );
      }

      function tryFullscreen() {
        if (isFullscreenActive()) {
          return Promise.resolve();
        }

        if (video.requestFullscreen) {
          return video.requestFullscreen().catch(() => {});
        }

        if (video.webkitRequestFullscreen) {
          try {
            video.webkitRequestFullscreen();
          } catch {
            // Ignore browser refusal.
          }
          return Promise.resolve();
        }

        if (video.msRequestFullscreen) {
          try {
            video.msRequestFullscreen();
          } catch {
            // Ignore browser refusal.
          }
          return Promise.resolve();
        }

        if (video.webkitEnterFullscreen) {
          try {
            video.webkitEnterFullscreen();
          } catch {
            // Ignore browser refusal.
          }
        }

        return Promise.resolve();
      }

      function hideFallback() {
        fallback.classList.remove("show");
      }

      function updateInputLock() {
        lockInput = isFullscreenActive();
      }

      function blockWhenLocked(event) {
        if (!lockInput) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();
      }

      async function startPlayback() {
        try {
          video.muted = false;
          video.volume = 1;

          await video.play();
          hideFallback();
          await tryFullscreen();
        } catch {
          fallback.classList.add("show");
        }
      }

      fallback.addEventListener("click", startPlayback);
      fallback.addEventListener("touchstart", startPlayback, { passive: true });
      document.addEventListener("click", () => {
        tryFullscreen();
      });
      document.addEventListener(
        "touchstart",
        () => {
          tryFullscreen();
        },
        { passive: true }
      );
      video.addEventListener("play", tryFullscreen);
      document.addEventListener("fullscreenchange", updateInputLock);
      document.addEventListener("webkitfullscreenchange", updateInputLock);
      [
        "click",
        "dblclick",
        "mousedown",
        "mouseup",
        "pointerdown",
        "pointerup",
        "touchstart",
        "touchend",
        "keydown",
        "keyup",
        "wheel",
        "contextmenu"
      ].forEach((eventName) => {
        document.addEventListener(eventName, blockWhenLocked, {
          capture: true,
          passive: false
        });
      });

      video.addEventListener("ended", async () => {
        if (document.fullscreenElement && document.exitFullscreen) {
          try {
            await document.exitFullscreen();
          } catch {
            // Ignore if browser blocks fullscreen exit.
          }
        }

        if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
          try {
            document.webkitExitFullscreen();
          } catch {
            // Ignore browser refusal.
          }
        }

        updateInputLock();
      });

      startPlayback();
    </script>
  </body>
</html>
